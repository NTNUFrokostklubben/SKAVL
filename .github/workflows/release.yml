name: release

on:
  push:
    tags:
      - "v*"

jobs:
  linux-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(grep '^  flutter:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Install Flutter
        uses: flutter-actions/setup-flutter@v1
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev cmake pkg-config

      - name: Fetch tiler (Linux)
        run: bash scripts/fetch_tiler.sh

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Flutter Linux
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          tar -czf skavl-${{ github.ref_name }}-linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: skavl-linux
          path: skavl-${{ github.ref_name }}-linux.tar.gz

  windows-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: echo "version=$(grep '^  flutter:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Install Flutter
        uses: flutter-actions/setup-flutter@v1
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}

      - name: Fetch tiler (Windows)
        shell: pwsh
        run: scripts\fetch_tiler.ps1

      - name: Fetch anomaly detector (Windows)
        shell: pwsh
        run: scripts\fetch_anomaly_detector.ps1

      - name: Fetch report generator (Windows)
        shell: pwsh
        run: scripts\fetch_report_generator.ps1

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath skavl-${{ github.ref_name }}-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: skavl-windows
          path: skavl-${{ github.ref_name }}-windows.zip

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - linux-build
      - windows-build
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: skavl-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: skavl-windows

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            skavl-${{ github.ref_name }}-linux.tar.gz
            skavl-${{ github.ref_name }}-windows.zip